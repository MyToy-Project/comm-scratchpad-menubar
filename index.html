<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratchpad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Feather icons -->
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    body { margin: 0; overflow: hidden; background: transparent; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans h-screen flex flex-col selection:bg-blue-200">
  
  <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-2">
      <i data-feather="message-square" class="w-5 h-5 text-blue-600"></i>
      <h1 class="text-base font-bold">Comm Scratchpad</h1>
    </div>
    <div class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">⌃⇧S to toggle</div>
  </header>

  <div class="p-3 bg-white border-b border-gray-100 shrink-0">
    <textarea
      id="inputArea"
      placeholder="Drop a thought before it slips away..."
      class="w-full h-24 text-sm resize-none outline-none placeholder:text-gray-300 bg-transparent"
    ></textarea>
    <div class="flex items-center justify-between mt-2">
      <span class="text-xs text-gray-400">Press <kbd class="bg-gray-100 px-1 rounded border border-gray-200">Enter</kbd> to save</span>
      <button
        id="saveBtn"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-full font-medium text-xs transition-colors flex items-center gap-1.5 shadow-sm"
      >
        Save <i data-feather="send" class="w-3 h-3"></i>
      </button>
    </div>
  </div>

  <main class="flex-1 overflow-y-auto p-3" id="notesList">
    <!-- Notes injected here via JS -->
  </main>

  <script>
    const fs = require('fs');
    const os = require('os');
    const path = require('path');

    const STORAGE_FILE = path.join(os.homedir(), '.comm-scratchpad.json');

    const inputArea = document.getElementById('inputArea');
    const saveBtn = document.getElementById('saveBtn');
    const notesList = document.getElementById('notesList');

    const expandedNotes = new Set();

    feather.replace();

    function getData() {
      try {
        if (!fs.existsSync(STORAGE_FILE)) {
          return { notes: [] };
        }
        const data = fs.readFileSync(STORAGE_FILE, 'utf8');
        if (!data) return { notes: [] };
        
        const parsed = JSON.parse(data);
        let notes = [];
        
        if (Array.isArray(parsed)) {
          notes = parsed;
        } else {
          notes = parsed.notes || [];
        }

        return {
          notes: notes.map(n => ({
            ...n,
            recaps: (n.recaps || []).map(r => ({
              ...r,
              name: r.name || r.title || ''
            }))
          }))
        };
      } catch (e) {
        console.error('Failed to read data:', e);
        return { notes: [] };
      }
    }

    function saveData(data) {
      try {
        fs.writeFileSync(STORAGE_FILE, JSON.stringify(data, null, 2), 'utf8');
      } catch (e) {
        console.error('Failed to save data:', e);
      }
    }

    function saveNote(text) {
      const data = getData();
      const newNote = {
        id: crypto.randomUUID(),
        text: text,
        timestamp: Date.now(),
        recaps: []
      };
      data.notes.unshift(newNote);
      saveData(data);
      renderNotes();
    }

    function updateNoteText(id, text) {
      const data = getData();
      const note = data.notes.find(n => n.id === id);
      if (note) {
        note.text = text;
        saveData(data);
      }
    }

    function deleteNote(id) {
      if (!confirm('Are you sure you want to delete this note?')) return;
      const data = getData();
      data.notes = data.notes.filter(n => n.id !== id);
      saveData(data);
      renderNotes();
    }

    function addRecap(noteId) {
      const data = getData();
      const note = data.notes.find(n => n.id === noteId);
      if (note) {
        note.recaps.push({
          id: crypto.randomUUID(),
          name: '',
          text: ''
        });
        expandedNotes.add(noteId);
        saveData(data);
        renderNotes();
      }
    }

    function updateRecap(noteId, recapId, text) {
      const data = getData();
      const note = data.notes.find(n => n.id === noteId);
      if (note) {
        const recap = note.recaps.find(r => r.id === recapId);
        if (recap) {
          recap.text = text;
          saveData(data);
        }
      }
    }

    function updateRecapName(noteId, recapId, name) {
      const data = getData();
      const note = data.notes.find(n => n.id === noteId);
      if (note) {
        const recap = note.recaps.find(r => r.id === recapId);
        if (recap) {
          recap.name = name;
          saveData(data);
        }
      }
    }

    function deleteRecap(noteId, recapId) {
      if (!confirm('Delete this recap?')) return;
      const data = getData();
      const note = data.notes.find(n => n.id === noteId);
      if (note) {
        note.recaps = note.recaps.filter(r => r.id !== recapId);
        saveData(data);
        renderNotes();
      }
    }

    function toggleRecaps(noteId) {
      if (expandedNotes.has(noteId)) {
        expandedNotes.delete(noteId);
      } else {
        expandedNotes.add(noteId);
      }
      renderNotes();
    }

    function renderNotes() {
      const { notes } = getData();
      
      if (notes.length === 0) {
        notesList.innerHTML = `
          <div class="text-center py-10 text-gray-400 flex flex-col items-center">
            <i data-feather="inbox" class="w-8 h-8 mb-2 opacity-50"></i>
            <p class="text-sm">No moments captured yet.</p>
          </div>
        `;
        feather.replace();
        return;
      }

      notesList.innerHTML = notes.map(note => {
        const isExpanded = expandedNotes.has(note.id);
        const hasRecaps = note.recaps.length > 0;

        return `
          <div class="bg-white p-4 mb-4 rounded-2xl border border-gray-200 shadow-sm group">
            <div class="flex justify-between items-start mb-2">
              <textarea
                oninput="updateNoteText('${note.id}', this.value); this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px';"
                class="text-sm text-gray-800 leading-relaxed flex-1 bg-transparent outline-none resize-none border-b border-transparent focus:border-gray-300 p-0 m-0 overflow-hidden"
              >${note.text}</textarea>
              <button 
                onclick="deleteNote('${note.id}')"
                class="opacity-0 group-hover:opacity-100 transition-opacity p-1 text-gray-400 hover:text-red-500 rounded ml-2"
                title="Delete Note"
              >
                <i data-feather="trash-2" class="w-3.5 h-3.5"></i>
              </button>
            </div>

            <div class="flex items-center justify-between text-[10px] text-gray-400 mb-2">
              <div class="flex items-center gap-3">
                <div class="flex items-center gap-1">
                  <i data-feather="clock" class="w-3 h-3"></i>
                  ${new Date(note.timestamp).toLocaleString()}
                </div>
                <button 
                  onclick="addRecap('${note.id}')"
                  class="flex items-center gap-1 text-blue-600 hover:text-blue-700 font-medium bg-blue-50 px-2 py-0.5 rounded-full transition-colors"
                >
                  <i data-feather="plus" class="w-2.5 h-2.5"></i> Add Recap
                </button>
              </div>

              ${hasRecaps ? `
                <button 
                  onclick="toggleRecaps('${note.id}')"
                  class="flex items-center gap-1 text-gray-500 hover:text-gray-700 font-medium bg-gray-100 px-2 py-0.5 rounded-full transition-colors"
                >
                  <i data-feather="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-3 h-3"></i>
                  ${isExpanded ? 'Collapse' : `Show Recaps (${note.recaps.length})`}
                </button>
              ` : ''}
            </div>

            <!-- Recaps Section -->
            <div class="${isExpanded ? 'block' : 'hidden'} space-y-3 mt-4">
              ${note.recaps.map((recap, index) => `
                <div class="bg-gray-50 rounded-lg p-2 border border-gray-100 relative group/recap">
                  <div class="flex items-center justify-between mb-1 gap-2">
                    <div class="flex items-center gap-1 shrink-0">
                      <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Recap #${index + 1}:</span>
                    </div>
                    <input 
                      type="text"
                      value="${recap.name}"
                      placeholder="Give it a name..."
                      oninput="updateRecapName('${note.id}', '${recap.id}', this.value)"
                      class="text-[10px] font-bold text-gray-600 tracking-wider bg-transparent outline-none flex-1 border-b border-transparent focus:border-gray-300"
                    />
                    <button 
                      onclick="deleteRecap('${note.id}', '${recap.id}')"
                      class="p-1 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors"
                      title="Delete Recap"
                    >
                      <i data-feather="x" class="w-3 h-3"></i>
                    </button>
                  </div>
                  <textarea
                    placeholder="Type your recap here..."
                    oninput="updateRecap('${note.id}', '${recap.id}', this.value)"
                    class="w-full bg-transparent text-xs outline-none resize-none placeholder:text-gray-300 min-h-[40px]"
                  >${recap.text}</textarea>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
      feather.replace();
      
      // Auto-resize all note textareas
      document.querySelectorAll('main textarea').forEach(ta => {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
      });
    }

    // Event Listeners
    saveBtn.addEventListener('click', () => {
      if (!inputArea.value.trim()) return;
      saveNote(inputArea.value.trim());
      inputArea.value = '';
    });

    inputArea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        saveBtn.click();
      }
    });

    window.addEventListener('focus', () => {
      setTimeout(() => inputArea.focus(), 50);
    });

    // Initial render
    renderNotes();
    inputArea.focus();
  </script>
</body>
</html>
